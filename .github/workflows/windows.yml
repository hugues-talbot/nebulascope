name: Windows build

# Proves the Windows/MSVC build compiles and packages a runnable zip as an
# artifact. CCfits and libXISF are not in vcpkg, so they are built from source
# and cached; the whole dependency layer only rebuilds when this file changes.

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  pull_request:
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    env:
      DEPS: ${{ github.workspace }}\deps        # install prefix for CCfits + libXISF
      VCPKG_TRIPLET: x64-windows

    steps:
      - uses: actions/checkout@v4

      # ---- Qt (cached by the action itself) --------------------------------
      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.7.*"
          arch: win64_msvc2019_64
          cache: true

      # ---- vcpkg: cfitsio + zlib + lz4 + pugixml ----------------------------
      # Use the runner's preinstalled vcpkg (kept in step with its MSVC) instead
      # of a pinned checkout — a stale baseline fails against new toolchains.
      - name: vcpkg dependencies
        shell: pwsh
        run: |
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV
          # vcpkg.json in the repo root = manifest mode; installs into
          # ./vcpkg_installed/<triplet> (no package args allowed).
          & "$env:VCPKG_INSTALLATION_ROOT/vcpkg" install --triplet $env:VCPKG_TRIPLET

      # ---- CCfits + libXISF from source, cached -----------------------------
      - name: Cache CCfits + libXISF
        id: depcache
        uses: actions/cache@v4
        with:
          path: ${{ env.DEPS }}
          key: deps-${{ runner.os }}-ccfits2.7-libxisf-${{ hashFiles('.github/workflows/windows.yml') }}

      - name: Build CCfits
        if: steps.depcache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          # Current release lives at an unversioned FTP path (v2.7 as of 2026-01)
          # and unpacks into a "CCfits/" subdirectory.
          curl -fsSL -o CCfits.tar.gz https://heasarc.gsfc.nasa.gov/FTP/software/fitsio/ccfits/CCfits.tar.gz
          if ((Get-Item CCfits.tar.gz).Length -lt 100000) { throw "CCfits download too small - got an error page?" }
          tar xzf CCfits.tar.gz
          # The subdir name varies between releases (CCfits/, CCfits-2.7/...) — find it.
          $src = (Get-ChildItem -Directory | Where-Object { $_.Name -like "CCfits*" } | Select-Object -First 1).Name
          if (-not $src) { Get-ChildItem; throw "No CCfits* directory after extraction" }
          echo "CCfits source dir: $src"
          $vcpkgInst = "$env:GITHUB_WORKSPACE/vcpkg_installed/$env:VCPKG_TRIPLET" -replace '\\','/'
          # CCfits ships its own FindCFITSIO.cmake (pkg-config based) that cannot
          # see vcpkg. Replace it with a stub that points straight at vcpkg.
          @(
            "SET(CFITSIO_FOUND TRUE)",
            "SET(CFITSIO_INCLUDE_DIR `"$vcpkgInst/include`")",
            "SET(CFITSIO_INCLUDE_DIRS `"$vcpkgInst/include`")",
            "SET(CFITSIO_LIBRARY `"$vcpkgInst/lib/cfitsio.lib`")",
            "SET(CFITSIO_LIBRARIES `"$vcpkgInst/lib/cfitsio.lib`")"
          ) | Set-Content -Path "$src/FindCFITSIO.cmake"
          cmake -S $src -B ccfits-build `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=$env:VCPKG_TRIPLET `
            -DVCPKG_MANIFEST_MODE=OFF `
            -DCMAKE_PREFIX_PATH="$vcpkgInst" `
            -DZLIB_ROOT="$vcpkgInst" `
            -DCMAKE_INSTALL_PREFIX="$env:DEPS" -DCMAKE_BUILD_TYPE=Release
          cmake --build ccfits-build --config Release --parallel
          cmake --install ccfits-build --config Release

      - name: Build libXISF
        if: steps.depcache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          # libXISF's CMakeLists uses pkg_check_modules — Windows has no
          # pkg-config by default; use the pkgconf bundled with vcpkg.
          $vcpkgInst = "$env:GITHUB_WORKSPACE/vcpkg_installed/$env:VCPKG_TRIPLET" -replace '\\','/'
          & "$env:VCPKG_INSTALLATION_ROOT/vcpkg" install pkgconf --triplet $env:VCPKG_TRIPLET --classic
          $pkgconf = "$env:VCPKG_INSTALLATION_ROOT/installed/$env:VCPKG_TRIPLET/tools/pkgconf/pkgconf.exe"
          $env:PKG_CONFIG_PATH = "$vcpkgInst/lib/pkgconfig"
          git clone --depth 1 https://gitea.nouspiro.space/nou/libXISF
          cmake -S libXISF -B libxisf-build `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=$env:VCPKG_TRIPLET `
            -DVCPKG_MANIFEST_MODE=OFF `
            -DCMAKE_PREFIX_PATH="$vcpkgInst" `
            -DPKG_CONFIG_EXECUTABLE="$pkgconf" `
            -DCMAKE_INSTALL_PREFIX="$env:DEPS" -DCMAKE_BUILD_TYPE=Release
          cmake --build libxisf-build --config Release --parallel
          cmake --install libxisf-build --config Release

      # ---- NebulaScope -------------------------------------------------------
      - name: Configure
        shell: pwsh
        run: |
          cmake -B build `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            "-DVCPKG_TARGET_TRIPLET=$env:VCPKG_TRIPLET" `
            "-DCMAKE_PREFIX_PATH=$env:DEPS" `
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure

      # ---- Package a runnable zip -------------------------------------------
      - name: Deploy Qt + DLLs
        shell: pwsh
        run: |
          $out = "package/NebulaScope"
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          Copy-Item build/src/Release/nebulascope.exe $out
          windeployqt --release --no-translations "$out/nebulascope.exe"
          # cfitsio & friends from the manifest install; CCfits + XISF from the deps prefix
          Copy-Item "$env:GITHUB_WORKSPACE/vcpkg_installed/$env:VCPKG_TRIPLET/bin/*.dll" $out -ErrorAction SilentlyContinue
          Copy-Item "$env:DEPS/bin/*.dll" $out -ErrorAction SilentlyContinue

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NebulaScope-windows-x64
          path: package
          retention-days: 30
